name: Log Scraper CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter pandas numpy matplotlib requests
          pip install -r requirements.txt

      - name: Verify Jupyter Installation
        run: jupyter --version

      - name: Execute Notebook
        run: |
          pip install nbconvert
          jupyter nbconvert --to notebook --execute log_scraper.ipynb --output executed_notebook.ipynb

      - name: Run Python Scripts
        run: |
          python log_scraper.py

      - name: Upload Processed Logs
        uses: actions/upload-artifact@v4
        with:
          name: processed-logs
          path: output/
